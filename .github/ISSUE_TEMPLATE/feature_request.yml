name: Feature request
description: Suggest an improvement to the SDK.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Framed around the `ChatSession` / `PolyMessaging` facade where possible.
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

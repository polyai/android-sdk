name: Publish to GitHub Packages

# Interim internal distribution while the public Maven Central namespace (ai.poly) is being verified.
# Manually triggered; publishes the SDK AAR to this repo's GitHub Packages Maven registry using the
# automatic GITHUB_TOKEN (no secrets to configure). Consumers authenticate with a PAT (read:packages).
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
      - name: Publish to GitHub Packages
        run: ./gradlew :polymessaging:publishMavenPublicationToGitHubPackagesRepository --no-configuration-cache --stacktrace
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

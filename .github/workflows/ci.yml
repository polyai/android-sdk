name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}  # manual re-runs (e.g. after a repo move, before any new push)

concurrency:
  # Cancel superseded runs only for PRs; let every push to main run to completion.
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title follows conventional commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|chore|test|refactor|style|ci|build|perf)(\(.+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PR title does not follow conventional commits format."
            echo "Expected: <type>[optional scope][!]: <description>"
            echo "See CONTRIBUTING.md for details."
            exit 1
          fi

  build-test:
    name: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      # setup-gradle v4 auto-validates the wrapper and caches Gradle.
      - uses: gradle/actions/setup-gradle@v6
      - name: Build, lint, test, apiCheck
        run: ./gradlew build test lint apiCheck --stacktrace

  # Off the PR critical path (slow): assemble the example ladder.
  # Not run on every PR. Enabled once the example modules land.
  assemble-samples:
    name: assemble-samples
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
      - name: Assemble all sample modules
        run: ./gradlew assembleDebug --stacktrace || echo "No sample modules yet (M4/M5)."
